<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>reaction-sync</title>
    <script>
      var ytAPIRetries = 0;
      var maxYTAPIRetries = 3;
      function onYouTubeIframeAPIReady() {
        window.youtubeAPIReady = true;
        const event = new CustomEvent('youtube-api-ready');
        window.dispatchEvent(event);
      }
      var tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      tag.onerror = function() {
        ytAPIRetries++;
        if (ytAPIRetries < maxYTAPIRetries) {
          setTimeout(function() {
            var newTag = document.createElement('script');
            newTag.src = "https://www.youtube.com/iframe_api";
            newTag.onerror = tag.onerror;
            document.head.appendChild(newTag);
          }, 2000 * ytAPIRetries);
        } else {
          alert('Failed to load YouTube API after ' + maxYTAPIRetries + ' attempts. YouTube videos will not work.');
        }
      };
      var firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    %sveltekit.body%
  </body>
</html>
